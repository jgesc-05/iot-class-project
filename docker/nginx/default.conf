server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    # Tamaño máximo de request (ajusta si subes archivos grandes)
    client_max_body_size 20M;

    # Rutas limpias de Laravel: si no existe el archivo, todo va a index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pasar archivos .php a PHP-FPM
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Timeouts para requests largos (p.ej. migraciones, seeders)
        fastcgi_read_timeout 300;
    }

    # Proxy reverso para Grafana (subpath)
    location /grafana/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Seguridad: no servir archivos ocultos ni .env
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Logs al stdout/stderr del contenedor
    access_log /dev/stdout;
    error_log /dev/stderr;
}
